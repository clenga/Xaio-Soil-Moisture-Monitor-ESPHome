# ================================================================
#  XIAO Soil Moisture Sensor - Enhanced ESPHome Configuration v2.3
#  Board : Seeed Studio XIAO ESP32-C6
# ----------------------------------------------------------------
#  Improvements over factory firmware:
#   ✔ Real moisture percentage (0-100 %) via calibrated ADC
#   ✔ Raw voltage sensor exposed for easy per-unit calibration
#   ✔ Battery voltage + battery percentage entity
#   ✔ Configurable thresholds & sleep durations via substitutions
#   ✔ Proper HA device classes (moisture, battery, voltage)
#   ✔ 4-state moisture status (Dry / Almost Dry / Normal / Too Wet)
#   ✔ Distinct LED blink patterns per moisture state
#   ✔ LEDs only blink on button press (maximises battery life)
#   ✔ No automatic LED blinks on wake cycles
#   ✔ First-boot AP mode preserved (no premature deep sleep)
# ================================================================
#
#  MOISTURE STATES & LED PATTERNS
#  ─────────────────────────────────────────────────────
#   0  - 18%  → Dry        → RED   RED   RED
#   18 - 35%  → Almost Dry → YLW   YLW   YLW
#   35 - 75%  → Normal     → GRN   GRN   GRN
#   75 - 100% → Too Wet    → RED   YLW   RED   YLW
#
#  BATTERY OPTIMISATIONS
#  ─────────────────────────────────────────────────────
#   - LEDs removed from auto wake entirely - button press only
#   - Eliminates all LED power draw during normal operation
#   - WiFi timeout reduced to 15s (saves power on failed connects)
#   - HA sync delay reduced from 5s to 3s
#   - fast_connect skips AP scan on every wake
#  CALIBRATION GUIDE (one-time per sensor, ~2 minutes)
#  ─────────────────────────────────────────────────────
#  1. Flash this firmware and let the device join your network.
#  2. Watch the "Soil Moisture Raw (V)" entity in HA:
#       a) Hold probe in completely DRY soil
#          → note the stable voltage  →  set dry_voltage below
#       b) Water soil thoroughly and wait 30 mins
#          → note the stable voltage  →  set wet_voltage below
#  3. Update dry_voltage / wet_voltage in substitutions, reflash.
# ================================================================

substitutions:
  # ── Capacitive probe calibration ─────────────────────────────
  # HIGH voltage = dry soil, LOW voltage = wet soil (capacitive)
  dry_voltage: "2.65"          # Voltage in completely dry soil  →  0 %
  wet_voltage: "1.47"         # Voltage in saturated wet soil   → 100 %

  # ── Moisture status thresholds (%) ───────────────────────────
  dry_pct: "18"                #   0-18%  → Dry        (red red red)
  almost_dry_pct: "35"         #  18-35%  → Almost Dry (yellow yellow yellow)
  normal_pct: "79"             #  35-79%  → Normal     (green green green)
                               #  75-100% → Too Wet    (red yellow red yellow)

  #Sleep durations
  sleep_normal_s: "28800"      #  8 h  when Normal
  sleep_almost_dry_s: "3600"   #  1 h  when Almost Dry
  sleep_dry_s: "3600"          #  1 h  when Dry
  sleep_too_wet_s: "3600"      #  1 h  when Too Wet

# ================================================================
#  ESPHome / Board
# ================================================================
esphome:
  name: xaio-soil-moisture-3
  friendly_name: Xaio Soil Moisture 3
  name_add_mac_suffix: false
  project:
    name: "xiao.soil-moisture-3"
    version: "3.4"
  on_boot:
    priority: 600
    then:
      - output.turn_off: gpio_3_output
      - output.turn_on: gpio_14_output
      - light.turn_on:
          id: pwm_excitation
          brightness: 68%
      - delay: 600ms
      - if:
          condition:
            lambda: 'return !id(wifi_ever_connected);'
          then:
            - logger.log:
                format: "First boot - preventing deep sleep for WiFi setup"
            - deep_sleep.prevent: deep_sleep_control
          else:
            - wait_until:
                condition:
                  wifi.connected:
                timeout: 15s
            - script.execute: read_and_sleep

esp32:
  board: seeed_xiao_esp32c6
  framework:
    type: esp-idf

logger:
safe_mode:
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true            # Skip AP scan on every wake – saves battery
  ap:
    ssid: "Xaio-Soil-Moisture-3"
    password: !secret ap_password
  on_connect:
    - globals.set:
        id: wifi_ever_connected
        value: 'true'

captive_portal:

globals:
  - id: wifi_ever_connected
    type: bool
    restore_value: true
    initial_value: 'false'

# ================================================================
#  GPIO Outputs
# ================================================================
output:
  - platform: gpio
    pin: GPIO3
    id: gpio_3_output

  - platform: gpio
    pin: GPIO14
    id: gpio_14_output

  - platform: gpio
    pin: GPIO18
    id: yellow_led_output

  - platform: gpio
    pin: GPIO19
    id: green_led_output

  - platform: gpio
    pin: GPIO20
    id: red_led_output

  - platform: ledc
    pin: GPIO21
    id: pwm_output
    frequency: 200kHz

# ================================================================
#  Lights
# ================================================================
light:
  - platform: binary
    id: yellow_led
    output: yellow_led_output
    internal: true

  - platform: binary
    id: green_led
    output: green_led_output
    internal: true

  - platform: binary
    id: red_led
    output: red_led_output
    internal: true

  - platform: monochromatic
    output: pwm_output
    id: pwm_excitation
    internal: true
    default_transition_length: 0s

# ================================================================
#  Deep Sleep
# ================================================================
deep_sleep:
  id: deep_sleep_control
  wakeup_pin:
    number: GPIO2
    allow_other_uses: true

# ================================================================
#  Sensors
# ================================================================
sensor:
  #Raw ADC voltage
  - platform: adc
    pin: GPIO1
    id: soil_raw_voltage
    name: "Soil Moisture Raw (V)"
    unit_of_measurement: "V"
    accuracy_decimals: 3
    device_class: voltage
    state_class: measurement
    entity_category: diagnostic
    attenuation: 12dB
    update_interval: never
    icon: "mdi:sine-wave"

  #Calibrated moisture percentage
  - platform: template
    id: soil_moisture_pct
    name: "Soil Moisture"
    unit_of_measurement: "%"
    accuracy_decimals: 1
    device_class: moisture
    state_class: measurement
    update_interval: never
    icon: "mdi:water-percent"
    lambda: |-
      if (!id(soil_raw_voltage).has_state()) return NAN;
      const float dry = ${dry_voltage};
      const float wet = ${wet_voltage};
      float pct = (dry - id(soil_raw_voltage).state) / (dry - wet) * 100.0f;
      if (pct < 0.0f)   pct = 0.0f;
      if (pct > 100.0f) pct = 100.0f;
      return pct;

  #Battery voltage
  - platform: adc
    pin: GPIO0
    id: battery_voltage
    name: "Battery Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement
    entity_category: diagnostic
    attenuation: 12dB
    update_interval: never
    icon: "mdi:battery"
    filters:
      - multiply: 1.00         # Corrected for onboard voltage divider

   #Battery percentage
  - platform: copy
    source_id: battery_voltage
    id: battery_pct
    name: "Battery"
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - calibrate_linear:
          - 1.0 -> 0.0
          - 1.588 -> 100.0
      - clamp:
          min_value: 0.0
          max_value: 100.0

# ================================================================
#  Text sensor - human-readable moisture status
# ================================================================
text_sensor:
  - platform: template
    name: "Soil Status"
    id: soil_status
    icon: "mdi:flower"
    lambda: |-
      if (!id(soil_moisture_pct).has_state()) return {"Unknown"};
      float pct = id(soil_moisture_pct).state;
      if      (pct < ${dry_pct})        return {"Dry 🌵"};
      else if (pct < ${almost_dry_pct}) return {"Almost Dry 🌤"};
      else if (pct < ${normal_pct})     return {"Normal 🌿"};
      else                              return {"Too Wet 💧"};

# ================================================================
#  Button (D2 / GPIO2)
# ================================================================
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO2
      mode:
        input: true
        pullup: true
      inverted: true
      allow_other_uses: true
    id: user_button
    name: "Button"
    internal: true
    filters:
      - delayed_on: 20ms
    on_multi_click:
      # Single press: instant reading + LED blink
      - timing:
          - ON for at most 500ms
          - OFF for at least 300ms
        then:
          - logger.log:
              format: "Button - instant reading"
          - script.execute: take_reading
          - script.wait: take_reading
          - script.execute: blink_status_led

      # Long press (3 s): force reboot
      - timing:
          - ON for at least 3s
        then:
          - logger.log:
              format: "Long press - rebooting"
          # Flash all three LEDs twice as reboot confirmation
          - repeat:
              count: 2
              then:
                - light.turn_on: red_led
                - light.turn_on: yellow_led
                - light.turn_on: green_led
                - delay: 300ms
                - light.turn_off: red_led
                - light.turn_off: yellow_led
                - light.turn_off: green_led
                - delay: 200ms
          - button.press: restart_button

# ================================================================
#  Restart button (also exposed as an entity in HA)
# ================================================================
button:
  - platform: restart
    name: "Restart"
    id: restart_button

# ================================================================
#  Scripts
# ================================================================
script:
  # Take all sensor readings
  - id: take_reading
    then:
      - component.update: soil_raw_voltage
      - component.update: soil_moisture_pct
      - component.update: battery_voltage
      - component.update: soil_status

  # Flash LED pattern matching current moisture state
  #
  #  Dry        →  RED   RED   RED
  #  Almost Dry →  YLW   YLW   YLW
  #  Normal     →  GRN   GRN   GRN
  #  Too Wet    →  RED   YLW   RED   YLW
  - id: blink_status_led
    then:
      - light.turn_off: green_led
      - light.turn_off: yellow_led
      - light.turn_off: red_led
      - if:
          condition:
            lambda: 'return id(soil_moisture_pct).state < ${dry_pct};'
          then:
            - repeat:
                count: 3
                then:
                  - light.turn_on: red_led
                  - delay: 300ms
                  - light.turn_off: red_led
                  - delay: 200ms
          else:
            if:
              condition:
                lambda: 'return id(soil_moisture_pct).state < ${almost_dry_pct};'
              then:
                - repeat:
                    count: 3
                    then:
                      - light.turn_on: yellow_led
                      - delay: 300ms
                      - light.turn_off: yellow_led
                      - delay: 200ms
              else:
                if:
                  condition:
                    lambda: 'return id(soil_moisture_pct).state < ${normal_pct};'
                  then:
                    - repeat:
                        count: 3
                        then:
                          - light.turn_on: green_led
                          - delay: 300ms
                          - light.turn_off: green_led
                          - delay: 200ms
                  else:
                    - repeat:
                        count: 2
                        then:
                          - light.turn_on: red_led
                          - delay: 300ms
                          - light.turn_off: red_led
                          - delay: 100ms
                          - light.turn_on: yellow_led
                          - delay: 300ms
                          - light.turn_off: yellow_led
                          - delay: 100ms

  # Boot flow: read → HA sync → sleep
  # LEDs do NOT blink on auto wake - button press only.
  # This maximises battery life.
  - id: read_and_sleep
    then:
      - script.execute: take_reading
      - script.wait: take_reading
      - delay: 3s              # Allow HA to receive the update over WiFi
      - if:
          condition:
            lambda: 'return id(soil_moisture_pct).state < ${dry_pct};'
          then:
            - deep_sleep.enter:
                id: deep_sleep_control
                sleep_duration: ${sleep_dry_s}s
          else:
            if:
              condition:
                lambda: 'return id(soil_moisture_pct).state < ${almost_dry_pct};'
              then:
                - deep_sleep.enter:
                    id: deep_sleep_control
                    sleep_duration: ${sleep_almost_dry_s}s
              else:
                if:
                  condition:
                    lambda: 'return id(soil_moisture_pct).state < ${normal_pct};'
                  then:
                    - deep_sleep.enter:
                        id: deep_sleep_control
                        sleep_duration: ${sleep_normal_s}s
                  else:
                    - deep_sleep.enter:
                        id: deep_sleep_control
                        sleep_duration: ${sleep_too_wet_s}s
